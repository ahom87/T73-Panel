services:
  - type: web
    name: vroom-gateway    # تغییر اسم از ren-gateway به vroom-gateway
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: ADMIN_PASSWORD
        value: admin
      - key: SECRET_KEY
        generateValue: true
      - key: PORT           # اضافه کردن این
        value: 8080         # پورت 8080
